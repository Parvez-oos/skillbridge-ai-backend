{
  "services": [
    {
      "type": "web",
      "name": "skillbridge-ai-backend",
      "runtime": "node",
      "plan": "free",
      "buildCommand": "npm install && npm run build",
      "startCommand": "npm start",
      "envVars": [
        {
          "key": "NODE_ENV",
          "value": "production"
        },
        {
          "key": "PORT",
          "value": "5000"
        },
        {
          "key": "MONGODB_URI",
          "sync": false
        },
        {
          "key": "JWT_SECRET",
          "sync": false
        },
        {
          "key": "JWT_EXPIRES_IN",
          "value": "7d"
        },
        {
          "key": "FRONTEND_URL",
          "sync": false
        },
        {
          "key": "GOOGLE_CLIENT_ID",
          "sync": false
        },
        {
          "key": "GOOGLE_CLIENT_SECRET",
          "sync": false
        },
        {
          "key": "GITHUB_CLIENT_ID",
          "sync": false
        },
        {
          "key": "GITHUB_CLIENT_SECRET",
          "sync": false
        },
        {
          "key": "FACEBOOK_APP_ID",
          "sync": false
        },
        {
          "key": "FACEBOOK_APP_SECRET",
          "sync": false
        },
        {
          "key": "CLOUDINARY_CLOUD_NAME",
          "sync": false
        },
        {
          "key": "CLOUDINARY_API_KEY",
          "sync": false
        },
        {
          "key": "CLOUDINARY_API_SECRET",
          "sync": false
        }
      ],
      "healthCheckPath": "/api/health",
      "autoDeploy": true,
      "branch": "main"
    }
  ]
}
